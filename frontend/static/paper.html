<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jason Capital Paper Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="top-nav">
        <div class="brand">JASON CAPITAL</div>
        <a href="/">Home</a>
        <a href="/terminal.html">Terminal</a>
        <a href="/lab.html">Lab</a>
        <a href="/models.html">Models</a>
        <a href="/paper.html" class="active">Paper Trading</a>
      </div>
      <div class="header">
        <div class="title">Jason Capital Paper Trading Desk</div>
        <div id="paperStatus" class="live-pill">Ready</div>
      </div>
      <div class="grid">
        <aside class="panel">
          <div class="form-row">
            <label for="paperCash">Reset cash</label>
            <input id="paperCash" type="number" value="100000" />
          </div>
          <div class="form-row">
            <button id="paperResetBtn">Reset Portfolio</button>
          </div>
          <div class="form-row">
            <label for="paperSymbol">Symbol</label>
            <input id="paperSymbol" value="BTCUSDT" />
          </div>
          <div class="form-row">
            <label for="paperQty">Quantity (+ buy, - sell)</label>
            <input id="paperQty" type="number" step="0.001" value="0.01" />
          </div>
          <div class="form-row">
            <button id="paperOrderBtn">Submit Market Order</button>
          </div>
          <div class="form-row">
            <label for="paperMarks">Mark symbols</label>
            <textarea id="paperMarks" rows="3">BTCUSDT,ETHUSDT,AAPL,MSFT,NVDA</textarea>
          </div>
          <div class="button-row">
            <button id="paperMarkBtn">Mark To Market</button>
            <button id="paperRefreshBtn">Refresh State</button>
          </div>
        </aside>
        <main>
          <section id="paperMetrics" class="metrics"></section>
          <section class="chart-grid">
            <div id="paperEquityChart" class="chart wide"></div>
            <div class="panel">
              <div style="margin-bottom:8px; color:#8ca0d6;">Positions</div>
              <table class="trades-table">
                <thead><tr><th>Symbol</th><th>Qty</th><th>Last Px</th></tr></thead>
                <tbody id="paperPositionsBody"></tbody>
              </table>
            </div>
            <div class="panel">
              <div style="margin-bottom:8px; color:#8ca0d6;">Recent Fills</div>
              <table class="trades-table">
                <thead><tr><th>Time</th><th>Symbol</th><th>Qty</th><th>Price</th></tr></thead>
                <tbody id="paperFillsBody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="/paper.js"></script>
  </body>
</html>
